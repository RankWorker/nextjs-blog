name: Publish package

on:
  push:
    tags:
      # The release-tag script enforces the exact v<package.version> value.
      - "v*"

# Repository code is built with read-only access. The OIDC permission is added
# only to the final job, which never checks out or executes repository code.
permissions:
  contents: read

concurrency:
  group: npm-${{ github.ref }}
  cancel-in-progress: false

env:
  NPM_CONFIG_IGNORE_SCRIPTS: "true"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_UPDATE_NOTIFIER: "false"

jobs:
  preflight:
    name: Verify release and build artifact
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release source
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          tag_sha="$(git rev-list -n 1 "$RELEASE_TAG")"
          test "$tag_sha" = "$RELEASE_SHA"
          git merge-base --is-ancestor "$tag_sha" refs/remotes/origin/main

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Verify required npm version
        run: |
          npm_version="$(npm --version)"
          node -e 'const [major, minor] = process.argv[1].split(".").map(Number); if (major < 11 || (major === 11 && minor < 15)) process.exit(1)' "$npm_version"

      - name: Verify tag matches package version
        run: npm run check:release-tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Install dependencies without lifecycle scripts
        run: npm ci --allow-git=none --allow-remote=none --allow-file=none --allow-directory=none

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Run release checks
        run: npm run check

      - name: Build the exact package tarball
        run: |
          mkdir package-artifact
          npm pack --pack-destination package-artifact --ignore-scripts

      - name: Upload immutable package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: package-artifact/*.tgz
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    name: Publish to npm
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Verify required npm version
        run: |
          npm_version="$(npm --version)"
          node -e 'const [major, minor] = process.argv[1].split(".").map(Number); if (major < 11 || (major === 11 && minor < 15)) process.exit(1)' "$npm_version"

      - name: Download verified package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: package-artifact

      - name: Publish with npm trusted publishing and provenance
        run: |
          shopt -s nullglob
          packages=(./package-artifact/*.tgz)
          if (( ${#packages[@]} != 1 )); then
            echo "Expected exactly one package tarball, found ${#packages[@]}" >&2
            exit 1
          fi
          npm publish "${packages[0]}" --access public --provenance --ignore-scripts
